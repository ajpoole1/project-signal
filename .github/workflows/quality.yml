name: Python Quality

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    name: Ruff + pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      # The canonical check script is the single definition of green (CHARTER.md).
      # CI runs the same file agents run locally — do not restate its steps here.
      - name: Checks (ruff + pytest)
        run: scripts/checks.sh

  dagbag-import:
    name: DagBag import check (Airflow 2.9.0)
    runs-on: ubuntu-latest
    # With local Docker retired (Tier 2), this is the ONLY pre-production gate that
    # catches a DAG that fails to parse — a broken DAG merged to main would silently
    # vanish from the scheduler on the AWS box. Matches the container's python3.11.
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Airflow + runtime deps
        # Airflow 2.9.0 pinned to the box's version. anthropic is imported at module
        # load by the llm / parameter_review task modules the DagBag scans, so it must
        # be present for a clean parse. Constraint file keeps the Airflow install
        # reproducible on py3.11.
        run: |
          pip install "apache-airflow==2.9.0" \
            --constraint "https://raw.githubusercontent.com/apache/airflow/constraints-2.9.0/constraints-3.11.txt"
          pip install -r requirements.txt
          pip install anthropic

      - name: Assert DAGs import with zero errors
        env:
          AIRFLOW__CORE__LOAD_EXAMPLES: "false"
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python - <<'PY'
          import sys
          from airflow.models.dagbag import DagBag

          bag = DagBag(dag_folder="dags/", include_examples=False)
          if bag.import_errors:
              print("DAG import errors:")
              for path, err in bag.import_errors.items():
                  print(f"\n=== {path} ===\n{err}")
              sys.exit(1)
          print(f"OK — {len(bag.dags)} DAG(s) imported cleanly:")
          for dag_id in sorted(bag.dags):
              print(f"  - {dag_id}")
          PY
