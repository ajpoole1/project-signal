x-airflow-common:
  &airflow-common
  image: apache/airflow:2.9.0-python3.11
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
    # DB host is env-driven (§7.4): POSTGRES_HOST comes from the environment —
    # the RDS endpoint on the AWS box, and host.docker.internal locally when unset.
    # No code branches: the same compose file runs both, parity via env only.
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST:-host.docker.internal}/${POSTGRES_DB}
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    _PIP_ADDITIONAL_REQUIREMENTS: "pandas>=2.0.0 anthropic>=0.40.0"
    PYTHONPATH: /opt/airflow
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY}
    # Registers the signal DB connection automatically — no manual UI setup needed
    AIRFLOW_CONN_SIGNAL_POSTGRES: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST:-host.docker.internal}/signal
    EODHD_API_KEY: ${EODHD_API_KEY}
    ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    POSTGRES_HOST: ${POSTGRES_HOST:-host.docker.internal}
    POSTGRES_DB: ${POSTGRES_DB}
    POSTGRES_USER: ${POSTGRES_USER}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  volumes:
    - ./dags:/opt/airflow/dags
    - ./plugins:/opt/airflow/plugins
    - ./config:/opt/airflow/config
    - ./dag_components:/opt/airflow/dag_components
    - ./scripts:/opt/airflow/scripts
    - ./tests:/opt/airflow/tests
    - airflow-logs:/opt/airflow/logs
  # Local dev only: lets the container resolve host.docker.internal to native-Windows
  # Postgres. Inert on the AWS box (POSTGRES_HOST points at the RDS endpoint, so this
  # mapping is never looked up) and dropped there by the deploy tooling if desired.
  extra_hosts:
    - "host.docker.internal:host-gateway"

services:
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com
        # jarvis: least-privilege service account for the operator-of-record (§6.2).
        # Custom role — read DAGs/DagRuns/TaskInstances/Logs + create DagRuns (to
        # retrigger a failed DAG), and nothing else: no variable edits, no connection
        # reads (connections hold DB credentials). Password from Secrets Manager via
        # JARVIS_AIRFLOW_PASSWORD; skipped if unset so local dev needn't provision it.
        airflow roles create jarvis || true
        airflow roles add-perms jarvis \
          -a can_read -r DAGs \
          -a can_read -r "DAG Runs" -a can_create -r "DAG Runs" \
          -a can_read -r "Task Instances" \
          -a can_read -r "Task Logs"
        if [ -n "$${JARVIS_AIRFLOW_PASSWORD:-}" ]; then
          airflow users create \
            --username jarvis \
            --password "$${JARVIS_AIRFLOW_PASSWORD}" \
            --firstname Jarvis \
            --lastname Operator \
            --role jarvis \
            --email jarvis@example.com || true
        else
          echo "JARVIS_AIRFLOW_PASSWORD unset — skipping jarvis account creation (local dev)"
        fi
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    restart: on-failure
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: on-failure
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  signal-tools:
    <<: *airflow-common
    profiles: ["tools"]
    entrypoint: ""
    command: sleep infinity
    restart: "no"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./plugins:/opt/airflow/plugins
      - ./config:/opt/airflow/config
      - ./dag_components:/opt/airflow/dag_components
      - ./scripts:/opt/airflow/scripts
      - ./tests:/opt/airflow/tests
      - ./docs:/opt/airflow/docs
      - ./analysis:/opt/airflow/analysis
      - airflow-logs:/opt/airflow/logs
    deploy:
      resources:
        limits:
          cpus: "4.0"
          # 8g → 4g (§7.7): the heaviest single task now peaks at ~224 MiB after the
          # indicators batch-streaming refactor (PR #16), so 4g is ~18x headroom and
          # leaves more of the box's 8 GiB for the scheduler+webserver and other tenants.
          memory: "4g"

volumes:
  airflow-logs:
